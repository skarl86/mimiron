# Mechanical gate for uv-managed Python projects.
# Mimiron 자체가 이걸 dogfood — pytest + ruff + mypy.

[[checks]]
name = "pytest"
command = ".venv/bin/pytest -q"
timeout_s = 300

[[checks]]
name = "ruff"
command = ".venv/bin/ruff check src/ tests/"
timeout_s = 60

[[checks]]
name = "mypy"
command = ".venv/bin/mypy src/"
timeout_s = 120
