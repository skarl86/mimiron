# Mechanical gate for uv-managed Python projects.
# Mimiron 자체가 이걸 dogfood — pytest + ruff + mypy.
#
# NOTE: env -u PYTHONPATH wrap is mandatory while the mimiron CLI ships as
# a Bash wrapper that sets PYTHONPATH to the *cached* plugin dir. Without
# this wrap, .venv/bin/pytest etc. would inherit that PYTHONPATH and
# import the stale, cached mimiron package instead of the editable source
# in .venv. Tracked by issue #15.

[[checks]]
name = "pytest"
command = "env -u PYTHONPATH .venv/bin/pytest -q"
timeout_s = 300

[[checks]]
name = "ruff"
command = "env -u PYTHONPATH .venv/bin/ruff check src/ tests/"
timeout_s = 60

[[checks]]
name = "mypy"
command = "env -u PYTHONPATH .venv/bin/mypy src/"
timeout_s = 120
