<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Mimiron — adaptive multi-agent harness for Claude Code">
  <defs>
    <!-- Background: deep obsidian with subtle radial highlight (titanium keeper vault feel) -->
    <radialGradient id="bg" cx="50%" cy="55%" r="75%">
      <stop offset="0%" stop-color="#1a1230"/>
      <stop offset="60%" stop-color="#0d0a1c"/>
      <stop offset="100%" stop-color="#06050f"/>
    </radialGradient>

    <!-- Phase node gradient: arcane purple core -->
    <radialGradient id="node" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#c490ff"/>
      <stop offset="55%" stop-color="#7a3ff5"/>
      <stop offset="100%" stop-color="#2a1262"/>
    </radialGradient>

    <!-- Final phase / done: emerald keeper signal -->
    <radialGradient id="nodeDone" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#9af0c4"/>
      <stop offset="55%" stop-color="#21a86b"/>
      <stop offset="100%" stop-color="#0d3b27"/>
    </radialGradient>

    <!-- Gold rim (Warcraft logo gilt) -->
    <linearGradient id="rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe89a"/>
      <stop offset="50%" stop-color="#d6a542"/>
      <stop offset="100%" stop-color="#704a13"/>
    </linearGradient>

    <!-- Arrow/connector gold -->
    <linearGradient id="conn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d6a542" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#ffd966" stop-opacity="1"/>
      <stop offset="100%" stop-color="#d6a542" stop-opacity="0.3"/>
    </linearGradient>

    <!-- Soft glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Gate (runestone) symbol -->
    <symbol id="gate" viewBox="-12 -16 24 32">
      <path d="M -8 -12 L 8 -12 L 10 0 L 8 12 L -8 12 L -10 0 Z" fill="none" stroke="url(#rim)" stroke-width="1.4"/>
      <circle cx="0" cy="0" r="3" fill="#ffd966"/>
    </symbol>

    <!-- Arrow head -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffd966"/>
    </marker>

    <!-- Subtle starfield (titanium vault interior) -->
    <pattern id="stars" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="40" r="0.6" fill="#ffe89a" opacity="0.4"/>
      <circle cx="110" cy="80" r="0.5" fill="#c490ff" opacity="0.3"/>
      <circle cx="170" cy="30" r="0.4" fill="#ffd966" opacity="0.4"/>
      <circle cx="60" cy="160" r="0.5" fill="#ffe89a" opacity="0.25"/>
      <circle cx="150" cy="180" r="0.4" fill="#9af0c4" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- BG -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#stars)"/>

  <!-- Decorative gear (top-right, faint) -->
  <g transform="translate(1075, 90)" opacity="0.18">
    <g fill="none" stroke="url(#rim)" stroke-width="2">
      <circle r="55"/>
      <circle r="20"/>
      <g>
        <rect x="-6" y="-66" width="12" height="14" fill="url(#rim)"/>
        <rect x="-6" y="52" width="12" height="14" fill="url(#rim)"/>
        <rect x="-66" y="-6" width="14" height="12" fill="url(#rim)"/>
        <rect x="52" y="-6" width="14" height="12" fill="url(#rim)"/>
        <rect x="-50" y="-50" width="12" height="12" transform="rotate(-45)" fill="url(#rim)"/>
        <rect x="38" y="-50" width="12" height="12" transform="rotate(45)" fill="url(#rim)"/>
        <rect x="-50" y="38" width="12" height="12" transform="rotate(-135)" fill="url(#rim)"/>
        <rect x="38" y="38" width="12" height="12" transform="rotate(135)" fill="url(#rim)"/>
      </g>
    </g>
  </g>
  <!-- Decorative gear (bottom-left, fainter) -->
  <g transform="translate(125, 540)" opacity="0.12">
    <g fill="none" stroke="url(#rim)" stroke-width="2">
      <circle r="42"/>
      <circle r="14"/>
      <rect x="-4" y="-52" width="8" height="10" fill="url(#rim)"/>
      <rect x="-4" y="42" width="8" height="10" fill="url(#rim)"/>
      <rect x="-52" y="-4" width="10" height="8" fill="url(#rim)"/>
      <rect x="42" y="-4" width="10" height="8" fill="url(#rim)"/>
    </g>
  </g>

  <!-- Logotype -->
  <text x="600" y="135" text-anchor="middle"
        font-family="Cinzel, 'Trajan Pro', Georgia, serif"
        font-size="86" font-weight="700"
        fill="url(#rim)" letter-spacing="14"
        filter="url(#glow)">MIMIRON</text>

  <!-- Tagline -->
  <text x="600" y="178" text-anchor="middle"
        font-family="Cinzel, Georgia, serif" font-size="18"
        fill="#d6a542" letter-spacing="6" opacity="0.85">
    THE TITAN KEEPER OF MULTI-AGENT PIPELINES
  </text>

  <!-- Pipeline group -->
  <g transform="translate(120, 340)">
    <!-- Connectors between nodes (drawn first, behind nodes) -->
    <g stroke="url(#conn)" stroke-width="3" fill="none" marker-end="url(#arrow)">
      <line x1="60"  y1="0" x2="180" y2="0"/>
      <line x1="252" y1="0" x2="372" y2="0"/>
      <line x1="444" y1="0" x2="564" y2="0"/>
      <line x1="636" y1="0" x2="756" y2="0"/>
      <line x1="828" y1="0" x2="948" y2="0"/>
    </g>

    <!-- Gate runestones over each connector -->
    <use href="#gate" x="120" y="0"/>
    <use href="#gate" x="312" y="0"/>
    <use href="#gate" x="504" y="0"/>
    <use href="#gate" x="696" y="0"/>
    <use href="#gate" x="888" y="0"/>

    <!-- Nodes: 6 phase circles with gold rim -->
    <!-- 1. clarify -->
    <g transform="translate(30, 0)">
      <circle r="32" fill="url(#node)" stroke="url(#rim)" stroke-width="2.5" filter="url(#glow)"/>
      <text y="6" text-anchor="middle" font-family="Cinzel, serif" font-size="28" font-weight="700" fill="#ffe89a">c</text>
      <text y="68" text-anchor="middle" font-family="Cinzel, serif" font-size="14" fill="#d6a542" letter-spacing="2">CLARIFY</text>
    </g>
    <!-- 2. spec -->
    <g transform="translate(222, 0)">
      <circle r="32" fill="url(#node)" stroke="url(#rim)" stroke-width="2.5" filter="url(#glow)"/>
      <text y="6" text-anchor="middle" font-family="Cinzel, serif" font-size="28" font-weight="700" fill="#ffe89a">s</text>
      <text y="68" text-anchor="middle" font-family="Cinzel, serif" font-size="14" fill="#d6a542" letter-spacing="2">SPEC</text>
    </g>
    <!-- 3. plan -->
    <g transform="translate(414, 0)">
      <circle r="32" fill="url(#node)" stroke="url(#rim)" stroke-width="2.5" filter="url(#glow)"/>
      <text y="6" text-anchor="middle" font-family="Cinzel, serif" font-size="28" font-weight="700" fill="#ffe89a">p</text>
      <text y="68" text-anchor="middle" font-family="Cinzel, serif" font-size="14" fill="#d6a542" letter-spacing="2">PLAN</text>
    </g>
    <!-- 4. execute -->
    <g transform="translate(606, 0)">
      <circle r="32" fill="url(#node)" stroke="url(#rim)" stroke-width="2.5" filter="url(#glow)"/>
      <text y="6" text-anchor="middle" font-family="Cinzel, serif" font-size="28" font-weight="700" fill="#ffe89a">e</text>
      <text y="68" text-anchor="middle" font-family="Cinzel, serif" font-size="14" fill="#d6a542" letter-spacing="2">EXECUTE</text>
    </g>
    <!-- 5. evaluate -->
    <g transform="translate(798, 0)">
      <circle r="32" fill="url(#node)" stroke="url(#rim)" stroke-width="2.5" filter="url(#glow)"/>
      <text y="6" text-anchor="middle" font-family="Cinzel, serif" font-size="28" font-weight="700" fill="#ffe89a">v</text>
      <text y="68" text-anchor="middle" font-family="Cinzel, serif" font-size="14" fill="#d6a542" letter-spacing="2">EVALUATE</text>
    </g>
    <!-- 6. finalize (done) -->
    <g transform="translate(990, 0)">
      <circle r="32" fill="url(#nodeDone)" stroke="url(#rim)" stroke-width="2.5" filter="url(#glow)"/>
      <text y="6" text-anchor="middle" font-family="Cinzel, serif" font-size="28" font-weight="700" fill="#e8ffe8">f</text>
      <text y="68" text-anchor="middle" font-family="Cinzel, serif" font-size="14" fill="#9af0c4" letter-spacing="2">FINALIZE</text>
    </g>
  </g>

  <!-- Foot legend -->
  <g transform="translate(600, 510)">
    <text text-anchor="middle" font-family="Cinzel, Georgia, serif" font-size="15" fill="#a884d8" letter-spacing="5" opacity="0.85">
      QUANTITATIVE GATES · DAG PARALLELISM · PERSISTENT LOOP · SAFETY PINS
    </text>
  </g>

  <!-- Bottom-right meta strip -->
  <text x="1170" y="610" text-anchor="end" font-family="ui-monospace, 'Courier New', monospace" font-size="11" fill="#7a6a3f" opacity="0.7">
    v0.1.0  ·  claude code plugin
  </text>
  <text x="30" y="610" font-family="ui-monospace, 'Courier New', monospace" font-size="11" fill="#7a6a3f" opacity="0.7">
    a titan keeper for the harness
  </text>
</svg>
